version: "2"

linters:
  default: standard
  enable:
    - maxcomments
  settings:
    custom:
      maxcomments:
        type: module
        description: Limits the number of comment lines per function and per file.
        original-url: github.com/samgozman/maxcomments-lint
        settings:
          func:                    # per-function comment budgets
            body-lines: 3          # hard cap: ≤3 body comment lines per function
            doc-lines: 5           # hard cap: ≤5 doc comment lines per function
            ratio: 8               # dynamic: ≤1 body comment line per 8 code lines
          file:                    # per-file comment budgets
            lines: 120             # hard cap: ≤120 comment lines per file
            ratio: 5               # dynamic: ≤1 comment line per 5 code lines
          ratio-min-lines: 10      # skip the ratio checks for scopes under 10 code lines
          check-generated: false   # skip generated files (`// Code generated ... DO NOT EDIT.`)
          ignore:                  # regexps vs. file path; matches are skipped entirely
            - 'testdata/'
